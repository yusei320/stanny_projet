<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tableau de bord - STATCOM SERVICES</title>
    <link rel="icon" type="image/jpeg" href="/assets/img/logo.jpg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --color-module: #3399ff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Outfit', sans-serif; background: #0a0e1a; color: #e0e6f0; min-height: 100vh; display: flex; overflow: hidden; }

        .main-content { flex: 1; display: flex; flex-direction: column; min-width: 0; overflow: hidden; margin-left: 260px; }
        .top-header { height: 72px; display: flex; align-items: center; justify-content: space-between; padding: 0 32px; background: rgba(255,255,255,0.02); border-bottom: 1px solid rgba(255,255,255,0.06); flex-shrink: 0; }
        .header-left h1 { font-size: 20px; font-weight: 700; color: #fff; line-height: 1.2; display: flex; align-items: center; gap: 10px; }
        .header-left h1 i { color: #3399ff; }
        .header-left p { font-size: 11px; color: rgba(255,255,255,0.4); font-weight: 500; margin-top: 2px; }
        
        .header-right { display: flex; align-items: center; gap: 24px; }
        .time-badge { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); padding: 8px 16px; border-radius: 12px; display: flex; flex-direction: column; align-items: flex-end; }
        #current-time { font-size: 16px; font-weight: 700; color: #fff; }
        #current-date { font-size: 10px; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 0.5px; }

        .page-body { flex: 1; overflow-y: auto; padding: 32px; }

        /* Dashboard Cards */
        .dash-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 24px; margin-bottom: 32px; }
        .dash-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 24px; padding: 28px; transition: 0.3s; position: relative; overflow: hidden; }
        .dash-card:hover { transform: translateY(-4px); background: rgba(255,255,255,0.05); }
        .card-icon { width: 48px; height: 48px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 20px; margin-bottom: 20px; }
        .card-val { font-size: 26px; font-weight: 800; color: #fff; margin-bottom: 4px; }
        .card-lab { font-size: 12px; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 1px; }

        /* Multi-stat card */
        .flux-box { margin-top: 20px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.06); }
        .flux-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; font-size: 13px; }
        .progress-container { height: 6px; background: rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden; }
        .progress-bar { height: 100%; border-radius: 10px; transition: 1s ease-out; }
        
    </style>
</head>
<body>
    <aside class="sidebar" id="sidebar"></aside>

    <main class="main-content">
        <header class="top-header">
            <div class="header-left">
                <button class="mobile-burger" onclick="utils.toggleSidebar()"><i class="fas fa-bars"></i></button>
                <h1><i class="fas fa-chart-pie"></i>Tableau de Bord</h1>
                <p>"Vision globale, Pilotage précis."</p>
            </div>
            <div class="header-right">
                <div class="time-badge">
                    <div id="current-time">00:00:00</div>
                    <div id="current-date">...</div>
                </div>
            </div>
        </header>

        <div class="page-body">
            <div class="dash-grid">
                <!-- Finance Card -->
                <div class="dash-card">
                    <div class="card-icon" style="background:rgba(51,153,255,0.1); color:#3399ff;"><i class="fas fa-wallet"></i></div>
                    <div class="card-val" id="stat-revenue">0 XAF</div>
                    <div class="card-lab">Solde de Trésorerie</div>
                    <div class="flux-box">
                        <div class="flux-row">
                            <span style="color:#4ade80;"><i class="fas fa-arrow-down"></i> Entrées</span>
                            <span id="flux-in-perc">+ 0%</span>
                        </div>
                        <div class="progress-container"><div id="flux-in-bar" class="progress-bar" style="background:#4ade80; width:0%"></div></div>
                        <div class="flux-row" style="margin-top:12px;">
                            <span style="color:#f87171;"><i class="fas fa-arrow-up"></i> Sorties</span>
                            <span id="flux-out-perc">- 0%</span>
                        </div>
                        <div class="progress-container"><div id="flux-out-bar" class="progress-bar" style="background:#f87171; width:0%"></div></div>
                    </div>
                </div>

                <!-- Projects Card -->
                <div class="dash-card">
                    <div class="card-icon" style="background:rgba(168,85,247,0.1); color:#a855f7;"><i class="fas fa-project-diagram"></i></div>
                    <div class="card-val" id="stat-projects">0</div>
                    <div class="card-lab">Projets Actifs</div>
                    <div style="margin-top:20px; font-size:13px; color:rgba(255,255,255,0.4);">
                        <i class="fas fa-chart-pie"></i> Visualisez l'avancement global dans la section Projets.
                    </div>
                </div>

                <!-- Tasks Card -->
                <div class="dash-card">
                    <div class="card-icon" style="background:rgba(34,197,94,0.1); color:#22c55e;"><i class="fas fa-tasks"></i></div>
                    <div class="card-val" id="stat-tasks">0</div>
                    <div class="card-lab">Tâches en Cours</div>
                    <div style="margin-top:20px; font-size:13px; color:rgba(255,255,255,0.4);">
                        <i class="fas fa-users-cog"></i> Coordination d'équipe optimale.
                    </div>
                </div>
            </div>


        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="/assets/js/notify.js"></script>
    <script src="/assets/js/api.js"></script>
    <script src="/pages/utils.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            if (!utils.checkAuth()) return;
            utils.loadSidebar('dashboard.html', '#3399ff');
            loadDashboardData();
            startClock();
        });

        function startClock() {
            const update = () => {
                const now = new Date();
                document.getElementById('current-time').textContent = now.toLocaleTimeString('fr-FR');
                document.getElementById('current-date').textContent = now.toLocaleDateString('fr-FR', { weekday:'long', day:'numeric', month:'long' });
            };
            setInterval(update, 1000); update();
        }

        async function loadDashboardData() {
            try {
                const [cash, projects, tasks] = await Promise.all([
                    api.get('/cash') || [],
                    api.get('/projects') || [],
                    api.get('/tasks') || []
                ]);

                // Finance Calc
                const totalIn = cash.filter(t => t.type === 'entrée').reduce((acc, t) => acc + parseFloat(t.amount), 0);
                const totalOut = cash.filter(t => t.type === 'sortie').reduce((acc, t) => acc + parseFloat(t.amount), 0);
                document.getElementById('stat-revenue').textContent = (totalIn - totalOut).toLocaleString() + ' XAF';
                
                const flux = totalIn + totalOut;
                if(flux > 0) {
                    const inP = Math.round((totalIn/flux)*100);
                    document.getElementById('flux-in-perc').textContent = `+ ${inP}%`;
                    document.getElementById('flux-in-bar').style.width = inP + '%';
                    document.getElementById('flux-out-perc').textContent = `- ${100-inP}%`;
                    document.getElementById('flux-out-bar').style.width = (100-inP) + '%';
                }

                document.getElementById('stat-projects').textContent = projects.filter(p => p.status !== 'Terminé').length;
                document.getElementById('stat-tasks').textContent = tasks.filter(t => t.status !== 'Terminé').length;


            } catch (e) { console.error(e); }
        }

    </script>
</body>
</html>
