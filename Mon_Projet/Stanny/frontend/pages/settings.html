<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paramètres - STATCOM SERVICES</title>
    <link rel="icon" type="image/jpeg" href="/assets/img/logo.jpg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Outfit', sans-serif; background: #0a0e1a; color: #e0e6f0; height: 100vh; display: flex; overflow: hidden; }

        .main-content { flex: 1; display: flex; flex-direction: column; min-width: 0; overflow: hidden; margin-left: 260px; }

        .header-left h1 { font-size: 20px; font-weight: 700; color: #fff; line-height: 1.2; display: flex; align-items: center; gap: 10px; }
        .header-left h1 i { color: #3399ff; }
        .header-left p { font-size: 11px; color: rgba(255,255,255,0.4); font-weight: 500; margin-top: 2px; }
        .top-header { height: 72px; display: flex; align-items: center; justify-content: space-between; padding: 0 32px; background: rgba(255,255,255,0.02); border-bottom: 1px solid rgba(255,255,255,0.06); flex-shrink: 0; }
        .page-body { flex: 1; overflow-y: auto; padding: 32px; }

        .settings-container { max-width: 800px; margin: 0 auto; display: flex; flex-direction: column; gap: 24px; }
        .settings-section { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 20px; padding: 32px; animation: fadeUp 0.5s ease both; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

        .section-title { font-size: 16px; font-weight: 700; color: #fff; margin-bottom: 24px; display: flex; align-items: center; gap: 12px; }
        .section-title i { color: #3399ff; font-size: 18px; }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .form-group { margin-bottom: 20px; }
        .form-label { display: block; font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
        .form-input, .form-select, .form-textarea { width: 100%; padding: 12px 16px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; color: #fff; font-family: 'Outfit', sans-serif; font-size: 14px; outline: none; transition: 0.2s; }
        .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: #3399ff; background: rgba(51,153,255,0.05); }

        .toggle-group { display: flex; align-items:center; justify-content: space-between; padding: 16px; background: rgba(255,255,255,0.02); border-radius: 14px; margin-bottom: 12px; }
        .toggle-text h4 { font-size: 14px; font-weight: 600; color: #fff; }
        .toggle-text p { font-size: 12px; color: rgba(255,255,255,0.3); }

        .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; inset: 0; background-color: rgba(255,255,255,0.1); transition: .4s; border-radius: 24px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #3399ff; }
        input:checked + .slider:before { transform: translateX(20px); }



        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(51,153,255,0.3); border-radius: 10px; transition: 0.3s; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(51,153,255,0.6); }
    
    </style>
</head>
<body>
    <aside class="sidebar" id="sidebar"></aside>

    <main class="main-content">
        <header class="top-header">
            <div class="header-left">
                <h1><i class="fas fa-cog"></i>Paramètres Système</h1>
                <p>"Configurez votre environnement de travail."</p>
            </div>
        </header>

        <div class="page-body">
            <div class="settings-container">
                <!-- General Settings -->
                <div class="settings-section">
                    <div class="section-title"><i class="fas fa-globe"></i> Préférences Générales</div>
                    <div class="form-grid">
                        <div class="form-group">
                            <label class="form-label">Devise par défaut</label>
                            <select id="currency" class="form-select">
                                <option value="XAF">XAF - Franc CFA</option>
                                <option value="EUR">EUR - Euro</option>
                                <option value="USD">USD - Dollar</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Format de date</label>
                            <select id="dateFormat" class="form-select">
                                <option value="dd/MM/yyyy">JJ/MM/AAAA</option>
                                <option value="yyyy-MM-dd">AAAA-MM-JJ</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Notifications -->
                <div class="settings-section">
                    <div class="section-title"><i class="fas fa-bell"></i> Notifications & Alertes</div>
                    <div class="toggle-group">
                        <div class="toggle-text">
                            <h4>Rappels de tâches</h4>
                            <p>Recevoir des alertes pour les échéances proches</p>
                        </div>
                        <label class="switch">
                            <input type="checkbox" id="taskReminders" checked>
                            <span class="slider"></span>
                        </label>
                    </div>
                    <div class="toggle-group">
                        <div class="toggle-text">
                            <h4>Alertes de paiement</h4>
                            <p>Notifier en cas de factures impayées</p>
                        </div>
                        <label class="switch">
                            <input type="checkbox" id="invoiceReminders" checked>
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>

                <!-- Invoice Formatting -->
                <div class="settings-section">
                    <div class="section-title"><i class="fas fa-file-invoice"></i> Configuration des Documents</div>
                    <div class="form-grid">
                        <div class="form-group">
                            <label class="form-label">Préfixe de facturation</label>
                            <input type="text" id="invoicePrefix" value="FAC" class="form-input">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Numéro suivant</label>
                            <input type="number" id="invoiceStartNumber" value="1" class="form-input">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Pied de page (Mention légale)</label>
                        <textarea id="invoiceFooter" rows="3" class="form-textarea" placeholder="Ex: Merci pour votre confiance..."></textarea>
                    </div>
                </div>

                <button class="btn-primary" onclick="saveSettings()" style="align-self:flex-end;">Enregistrer les modifications</button>
            </div>
        </div>
    </main>


    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="/assets/js/notify.js"></script>
    <script src="/assets/js/api.js"></script>
    <script src="/pages/utils.js"></script>
    <script>
        
        document.addEventListener('DOMContentLoaded', async () => {
            if (!utils.checkAuth()) return;
            utils.loadSidebar('settings.html', '#3399ff');
            loadSettings();
        });

        async function loadSettings() {
            try {
                const settings = await api.get('/settings');
                if (settings) {
                    if(settings.currency) document.getElementById('currency').value = settings.currency;
                    if(settings.dateFormat) document.getElementById('dateFormat').value = settings.dateFormat;
                    if(settings.invoicePrefix) document.getElementById('invoicePrefix').value = settings.invoicePrefix;
                    if(settings.invoiceStartNumber) document.getElementById('invoiceStartNumber').value = settings.invoiceStartNumber;
                    if(settings.invoiceFooter) document.getElementById('invoiceFooter').value = settings.invoiceFooter;
                    document.getElementById('taskReminders').checked = !!settings.taskReminders;
                    document.getElementById('invoiceReminders').checked = !!settings.invoiceReminders;
                }
            } catch (e) { console.error(e); }
        }

        async function saveSettings() {
            const payload = {
                currency: document.getElementById('currency').value,
                dateFormat: document.getElementById('dateFormat').value,
                invoicePrefix: document.getElementById('invoicePrefix').value,
                invoiceStartNumber: document.getElementById('invoiceStartNumber').value,
                invoiceFooter: document.getElementById('invoiceFooter').value,
                taskReminders: document.getElementById('taskReminders').checked,
                invoiceReminders: document.getElementById('invoiceReminders').checked
            };

            try {
                await api.post('/settings', payload);
                notify.success("Paramètres enregistrés avec succès !");
            } catch (e) { notify.error("Erreur lors de l'enregistrement."); }
        }
    </script>
</body>
</html>
