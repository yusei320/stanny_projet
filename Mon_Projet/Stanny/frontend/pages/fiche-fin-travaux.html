<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fiches de Fin de Travaux - STATCOM SERVICES</title>
    <link rel="icon" type="image/jpeg" href="/assets/img/logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        

        :root { --color-module: #06b6d4; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Outfit', sans-serif; background: #0a0e1a; color: #e0e6f0; min-height: 100vh; display: flex; overflow: hidden; }

        .main-content { flex: 1; display: flex; flex-direction: column; min-width: 0; overflow: hidden; margin-left: 260px; }
        .top-header { height: 72px; display: flex; align-items: center; justify-content: space-between; padding: 0 32px; background: rgba(255,255,255,0.02); border-bottom: 1px solid rgba(255,255,255,0.06); flex-shrink: 0; }
        .header-left h1 { font-size: 20px; font-weight: 700; color: #fff; line-height: 1.2; display: flex; align-items: center; gap: 10px; }
        .header-left h1 i { color: #06b6d4; }
        .header-left p { font-size: 11px; color: rgba(255,255,255,0.4); font-weight: 500; margin-top: 2px; }
        .header-right { display: flex; align-items: center; gap: 24px; }
        



        .page-body { flex: 1; overflow-y: auto; padding: 32px; }

        /* Stats Mini Blocs */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 32px; }
        .stat-card-mini { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.06); border-radius: 16px; padding: 20px; display: flex; align-items: center; gap: 12px; transition: 0.3s; }
        .stat-card-mini:hover { background: rgba(255, 255, 255, 0.05); transform: translateY(-2px); border-color: rgba(6, 182, 212, 0.3); }
        .stat-icon-mini { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
        .stat-val-mini { font-size: 18px; font-weight: 800; color: #fff; }
        .stat-lab-mini { font-size: 10px; color: rgba(255, 255, 255, 0.4); text-transform: uppercase; }

        /* View Toggle */
        .view-controls { display: flex; align-items: center; }
        .toggle-btns { display: flex; background: rgba(255,255,255,0.04); padding: 3px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.05); }
        .toggle-btn { padding: 6px 12px; border-radius: 7px; border: none; background: none; color: rgba(255,255,255,0.3); cursor: pointer; font-size: 11px; font-weight: 700; display: flex; align-items: center; gap: 6px; transition: 0.2s; }
        .toggle-btn.active { background: rgba(6, 182, 212, 0.1); color: #06b6d4; }

        /* Grid View */
        .fiche-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .fiche-card { background: #131829 !important; border: 1px solid rgba(255,255,255,0.06); border-radius: 16px; padding: 24px; animation: fadeUp 0.5s ease both; display: flex; flex-direction: column; gap: 16px; transition: all 0.3s ease; position: relative; overflow: hidden; }
        .fiche-card:hover { background: #1e293b !important; transform: translateY(-4px); box-shadow: 0 12px 24px rgba(0,0,0,0.3); border-color: rgba(6, 182, 212, 0.3); }
        .fiche-card::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: #06b6d4; opacity: 0; transition: 0.3s; }
        .fiche-card:hover::before { opacity: 1; }
        .fiche-header { display: flex; justify-content: space-between; align-items: center; }
        .f-num { font-size: 11px; font-weight: 800; color: #06b6d4; background: rgba(6, 182, 212, 0.1); padding: 4px 10px; border-radius: 20px; }
        .f-title { font-size: 16px; font-weight: 700; color: #fff; line-height: 1.4; }
        .f-footer { display: flex; justify-content: space-between; align-items: center; padding-top: 16px; border-top: 1px solid rgba(255,255,255,0.06); }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

        /* ─── Premium Data Table View ────────────────────────────────── */
        .data-card { background: #ffffff !important; border: 1px solid #e2e8f0 !important; border-radius: 16px; overflow: hidden; padding: 16px 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.03) !important; margin-top: 24px; margin-bottom: 24px; display: none; }
        .premium-table { width: 100%; border-collapse: separate; border-spacing: 0; text-align: left; }
        .premium-table th { padding: 16px 20px; font-size: 11px; font-weight: 800; color: var(--color-module) !important; text-transform: uppercase; letter-spacing: 1px; border-bottom: none !important; background: transparent !important; }
        .premium-table td { padding: 16px 20px; font-size: 13px; background: #fff; border-bottom: 1px solid #f1f5f9 !important; vertical-align: middle; transition: 0.2s; color: #334155; }
        .premium-table tr { transition: all 0.3s ease; }
        .premium-table tr:hover td { background: #f8fafc; cursor: pointer; }
        
        .action-cell { display: flex; align-items: center; gap: 16px; }
        .action-icon { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; background: rgba(6, 182, 212, 0.08); color: var(--color-module); transition: transform 0.3s; border: 1px solid rgba(6, 182, 212, 0.15); }
        .premium-table tr:hover .action-icon { transform: rotate(10deg) scale(1.1); }
        .action-texts { display: flex; flex-direction: column; }
        .action-title { font-weight: 700; color: #1e293b; font-size: 13px; margin-bottom: 3px; letter-spacing: 0.3px; }
        .action-sub { font-size: 11px; color: #94a3b8; font-weight: 500; }
        
        .btn-details { width: 36px; height: 36px; border-radius: 8px; background: #f8fafc; border: 1px solid #e2e8f0; color: #64748b; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; font-size: 14px; }
        .btn-details:hover { background: #e2e8f0; color: #1e293b; transform: scale(1.05); }
        .btn-details.delete { color: #ef4444; }
        .btn-details.delete:hover { background: #fef2f2; border-color: #fca5a5; }

        .col-date { font-weight: 600; color: #1e293b; white-space: nowrap; font-variant-numeric: tabular-nums; }
        .col-date .time { font-size: 11px; color: #94a3b8; font-weight: 500; display: block; margin-left: 0; margin-top: 4px; }


        
        .empty-state { text-align: center; padding: 40px; color: rgba(255,255,255,0.2); grid-column: 1/-1; }
        
        /* Modal & Forms */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); display: none; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
        .modal-overlay.show { display: flex; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .modal { background: rgba(19, 24, 41, 0.95); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; width: 100%; max-width: 600px; box-shadow: 0 40px 100px rgba(0,0,0,0.8); backdrop-filter: blur(20px); transform: translateY(20px); animation: slideUp 0.3s ease forwards; max-height: 90vh; overflow-y: auto; }
        @keyframes slideUp { to { transform: translateY(0); } }
        .modal-header { padding: 24px 32px; border-bottom: 1px solid rgba(255,255,255,0.06); display: flex; justify-content: space-between; align-items: center; }
        .modal-header h3 { font-size: 18px; font-weight: 700; color: #fff; }
        .modal-body { padding: 32px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
        .form-group { margin-bottom: 20px; }
        .form-label { display: block; font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.4); text-transform: uppercase; margin-bottom: 8px; }
        .form-input, .form-select { width: 100%; padding: 14px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; color: #fff; font-family: 'Outfit'; outline: none; transition: 0.3s; }
        .form-input:focus, .form-select:focus { border-color: rgba(6, 182, 212, 0.4); background: rgba(255,255,255,0.05); }
        .form-input::placeholder { color: rgba(255,255,255,0.2); }
        .form-select option { background: #0a0e1a; color: #fff; }
        /* Checklist Styles */
        .checklist-section { margin-top: 24px; border-top: 1px solid rgba(255,255,255,0.06); padding-top: 20px; }
        .checklist-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .checklist-table { width: 100%; border-collapse: collapse; margin-bottom: 10px; }
        .checklist-table th { text-align: left; font-size: 10px; color: rgba(255,255,255,0.3); text-transform: uppercase; padding-bottom: 8px; }
        .checklist-table td { padding: 4px 0; }
        .checklist-input { background: rgba(255,255,255,0.02) !important; border: 1px solid rgba(255,255,255,0.05) !important; padding: 8px 12px !important; font-size: 13px !important; }
        .btn-add-row { background: rgba(6, 182, 212, 0.1); color: #06b6d4; border: 1px dashed rgba(6, 182, 212, 0.3); padding: 8px; border-radius: 8px; width: 100%; cursor: pointer; font-size: 12px; font-weight: 700; transition: 0.2s; }
        .btn-add-row:hover { background: rgba(6, 182, 212, 0.2); }
    
        

    </style>

</head>
<body>
    <aside class="sidebar" id="sidebar"></aside>

    <main class="main-content">
        <header class="top-header">
            <div class="header-left">
                <button class="mobile-burger" onclick="utils.toggleSidebar()"><i class="fas fa-bars"></i></button>
                <h1><i class="fas fa-clipboard-check"></i>Fiches de Fin de Travaux</h1>
                <p>"La garantie d'un travail achevé avec rigueur."</p>
            </div>
            <div class="header-right">
                <div class="view-controls">
                    <div class="toggle-btns">
                        <button class="toggle-btn active" onclick="switchView('grid', this)"><i class="fas fa-th"></i> Blocs</button>
                        <button class="toggle-btn" onclick="switchView('table', this)"><i class="fas fa-list"></i> Liste</button>
                    </div>
                </div>
                <button class="btn-primary btn-glow" onclick="openFicheModal()"><i class="fas fa-plus"></i> Nouvelle Fiche</button>
            </div>
        </header>

        <div class="page-body">
            <div class="stats-grid">
                <div class="stat-card-mini">
                    <div class="stat-icon-mini" style="background:rgba(6, 182, 212, 0.15); color:#06b6d4;"><i class="fas fa-file-signature"></i></div>
                    <div><div class="stat-val-mini" id="stat-total-fiches">0</div><div class="stat-lab-mini">Total Fiches</div></div>
                </div>
                <div class="stat-card-mini">
                    <div class="stat-icon-mini" style="background:rgba(236, 72, 153, 0.15); color:#ec4899;"><i class="fas fa-calendar-check"></i></div>
                    <div><div class="stat-val-mini" id="stat-fiches-mois">0</div><div class="stat-lab-mini">Interventions ce mois</div></div>
                </div>
            </div>

            <div id="fiches-list" class="fiche-grid">
                <!-- Cards -->
            </div>

            <div id="fiches-table-container" class="data-card">
                <table class="premium-table">
                    <thead>
                        <tr>
                            <th>Référence</th>
                            <th>Localisation / Objet</th>
                            <th>Date & Heure</th>
                            <th style="text-align:right;">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="fiches-table">
                        <!-- Rows -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Modal -->
    <div class="modal-overlay" id="ficheModal">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modal-title">Nouvelle Fiche de Travaux</h3>
                <button class="btn-icon" onclick="closeFicheModal()"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <form id="ficheForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Projet</label>
                            <select id="f_project" class="form-select" required onchange="onProjectChange()">
                                <option value="">Sélectionner un projet</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Client</label>
                            <input type="text" id="f_client" class="form-input" readonly placeholder="Auto-rempli">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Objet / Localisation des travaux</label>
                        <input type="text" id="f_location" class="form-input" placeholder="Ex: Résidence Plateau - Installation Éclairage..." required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Responsable Technique</label>
                            <input type="text" id="f_tech" class="form-input" placeholder="Nom du responsable" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Date d'achèvement</label>
                            <input type="date" id="f_date" class="form-input" required>
                        </div>
                    </div>

                    <div class="checklist-section">
                        <div class="checklist-header">
                            <label class="form-label">Actions & Observations</label>
                        </div>
                        <table class="checklist-table">
                            <thead>
                                <tr>
                                    <th style="width: 70%;">Action / Tâche</th>
                                    <th style="width: 25%;">Observation</th>
                                    <th style="width: 5%;"></th>
                                </tr>
                            </thead>
                            <tbody id="checklist-body">
                                <!-- Rows dynamic -->
                            </tbody>
                        </table>
                        <button type="button" class="btn-add-row" onclick="addChecklistItem()">+ AJOUTER UNE LIGNE</button>
                    </div>
                    <div style="display:flex; justify-content:flex-end; gap:12px; margin-top:10px;">
                        <button type="button" class="btn-outline" onclick="closeFicheModal()">ANNULER</button>
                        <button type="submit" class="btn-primary">ENREGISTER LA FICHE</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="/assets/js/notify.js"></script>
    <script src="/assets/js/api.js"></script>
    <script src="/pages/utils.js"></script>
    <script>
        

        document.addEventListener('DOMContentLoaded', async () => {
            if (!utils.checkAuth()) return;
            utils.loadSidebar('fiche-fin-travaux.html', '#06b6d4');
            loadFiches();
            loadProjects();
        });

        let currentEditingId = null;
        let projectsData = [];

        async function loadProjects() {
            try {
                projectsData = await api.get('/projects');
                const sel = document.getElementById('f_project');
                projectsData.forEach(p => {
                    sel.innerHTML += `<option value="${p.id}">${p.name}</option>`;
                });
            } catch(e) { console.error(e); }
        }

        function onProjectChange() {
            const pid = document.getElementById('f_project').value;
            const p = projectsData.find(x => x.id == pid);
            if (p) {
                document.getElementById('f_client').value = p.client_name || '';
                document.getElementById('f_tech').value = p.manager || '';
            }
        }

        function openFicheModal(id = null) {
            currentEditingId = id;
            document.getElementById('modal-title').textContent = id ? 'Modifier la Fiche' : 'Nouvelle Fiche de Travaux';
            document.getElementById('checklist-body').innerHTML = ''; // Clear

            if (id) {
                loadFicheData(id);
            } else {
                document.getElementById('ficheForm').reset();
                document.getElementById('f_date').value = new Date().toISOString().substring(0, 10);
                // Pre-fill with default checklist
                const defaults = [
                    "Fourniture équipements informatique",
                    "Pose de goulottes",
                    "Tirage des câbles RJ-45",
                    "Pose des Prises RJ-45 mosaïque",
                    "Pose de la Baie",
                    "Pose de Panneaux de brassage",
                    "Pose de switch",
                    "Pose de Routeur",
                    "Sertissage des câbles",
                    "Mise en service"
                ];
                defaults.forEach(d => addChecklistItem(d, 'Ok'));
            }
            document.getElementById('ficheModal').classList.add('show');
        }

        function addChecklistItem(action = '', obs = 'Ok') {
            const body = document.getElementById('checklist-body');
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><input type="text" class="form-input checklist-input ci-action" value="${action}" placeholder="Ex: Pose de goulottes"></td>
                <td><input type="text" class="form-input checklist-input ci-obs" value="${obs}" placeholder="Ok"></td>
                <td><button type="button" class="btn-icon btn-delete" onclick="this.closest('tr').remove()" style="width:28px; height:28px;"><i class="fas fa-times"></i></button></td>
            `;
            body.appendChild(tr);
        }

        async function loadFicheData(id) {
            try {
                const fiches = await api.get('/documents?type=fiche_travaux');
                const f = fiches.find(x => x.id == id);
                if (f) {
                    document.getElementById('f_project').value = f.project_id || '';
                    document.getElementById('f_client').value = f.client_name || '';
                    document.getElementById('f_location').value = f.location || '';
                    document.getElementById('f_tech').value = f.responsible_tech || '';
                    document.getElementById('f_date').value = f.date ? f.date.substring(0, 10) : '';
                    
                    // Load items (actions)
                    const items = typeof f.items === 'string' ? JSON.parse(f.items) : (f.items || []);
                    if (items.length > 0) {
                        items.forEach(item => addChecklistItem(item.action, item.observation));
                    }
                }
            } catch(e) { console.error(e); }
        }

        function closeFicheModal() {
            document.getElementById('ficheModal').classList.remove('show');
            currentEditingId = null;
        }

        async function deleteFiche(id) {
            if (!await notify.confirm('Voulez-vous vraiment supprimer cette fiche ?')) return;
            try {
                await api.delete('/documents/' + id);
                loadFiches();
            } catch(e) { notify.error("Erreur lors de la suppression"); }
        }

        function switchView(view, btn) {
            document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('fiches-list').style.display = view === 'grid' ? 'grid' : 'none';
            document.getElementById('fiches-table-container').style.display = view === 'table' ? 'block' : 'none';
        }

        function formatCardDateTime(doc) {
            const dateValue = doc.date || doc.created_at;
            const timeValue = doc.created_at || doc.date;
            const date = dateValue ? new Date(dateValue) : null;
            const time = timeValue ? new Date(timeValue) : null;
            const dateText = date && !Number.isNaN(date.getTime()) ? date.toLocaleDateString('fr-FR') : '-';
            const timeText = time && !Number.isNaN(time.getTime()) ? time.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit', second: '2-digit' }) : '--:--:--';
            return `<span style="display:flex; flex-direction:column; align-items:flex-end; gap:2px; font-size:11px; color:rgba(255,255,255,0.35);"><span>${dateText}</span><span style="color:rgba(255,255,255,0.55); font-variant-numeric:tabular-nums;">${timeText}</span></span>`;
        }

        let allFiches = [];
        let fichesPage = 1;
        const fichesPerPage = 10;

        async function loadFiches() {
            try {
                const f = await api.get('/documents?type=fiche_travaux');
                const list = document.getElementById('fiches-list');
                const tBody = document.getElementById('fiches-table');
                
                if (!f || f.length === 0) {
                    document.getElementById('stat-total-fiches').textContent = '0';
                    document.getElementById('stat-fiches-mois').textContent = '0';
                    list.innerHTML = '<div class="empty-state"><p>Aucune fiche trouvée</p></div>';
                    tBody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding:40px;">Aucune fiche</td></tr>';
                    return;
                }

                allFiches = f;
                document.getElementById('stat-total-fiches').textContent = f.length;
                const currentMonth = new Date().getMonth();
                const currentYear = new Date().getFullYear();
                const monthCount = f.filter(x => {
                    const d = new Date(x.date);
                    return d.getMonth() === currentMonth && d.getFullYear() === currentYear;
                }).length;
                document.getElementById('stat-fiches-mois').textContent = monthCount;
                renderFiches();
            } catch (e) { console.error(e); }
        }

        function renderFiches() {
            const f = allFiches;
            const list = document.getElementById('fiches-list');
            const tBody = document.getElementById('fiches-table');
            const totalPages = Math.ceil(f.length / fichesPerPage);
            const start = (fichesPage - 1) * fichesPerPage;
            const toShow = f.slice(start, start + fichesPerPage);

            list.innerHTML = toShow.map(x => `
                    <div class="fiche-card">
                        <div class="fiche-header">
                            <span class="f-num">FFT #${x.id}</span>
                            ${formatCardDateTime(x)}
                        </div>
                        <div class="f-title">${x.location || 'Fiche de travaux'}</div>
                        <div style="font-size:12px; color:rgba(255,255,255,0.4);">Projet: <span style="color:#fff;">${x.project_name || '-'}</span></div>
                        <div class="f-footer">
                            <div style="display:flex; gap:8px;">
                                <button onclick="openFicheModal(${x.id})" class="btn-icon btn-edit" title="Modifier"><i class="fas fa-edit"></i></button>
                                <button onclick="event.stopPropagation(); utils.downloadPdf('/api/documents/${x.id}/pdf')" class="btn-icon" title="Télécharger PDF" style="color:#06b6d4; background:rgba(6,182,212,0.1);"><i class="fas fa-file-pdf"></i></button>
                            </div>
                            <button onclick="deleteFiche(${x.id})" class="btn-icon btn-delete" title="Supprimer"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                `).join('');

            tBody.innerHTML = toShow.map(x => `
                    <tr>
                        <td>
                            <div class="action-cell">
                                <div class="action-icon"><i class="fas fa-clipboard-check"></i></div>
                                <div class="action-texts">
                                    <span class="action-title">#FFT-${x.id}</span>
                                    <span class="action-sub">${x.project_name || '-'}</span>
                                </div>
                            </div>
                        </td>
                        <td style="color:#64748b; font-size:12px; max-width:250px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${x.location || '-'}</td>
                        <td class="col-date">
                            <span class="rt-date"></span>
                            <span class="time rt-time"></span>
                        </td>
                        <td>
                            <div style="display:flex; gap:8px; justify-content:flex-end;">
                                <button class="btn-details" onclick="openFicheModal(${x.id})" title="Modifier"><i class="fas fa-edit"></i></button>
                                <button class="btn-details" onclick="event.stopPropagation(); utils.downloadPdf('/api/documents/${x.id}/pdf')" title="PDF" style="color:#0ea5e9;"><i class="fas fa-file-pdf"></i></button>
                                <button class="btn-details delete" onclick="deleteFiche(${x.id})" title="Supprimer"><i class="fas fa-trash"></i></button>
                            </div>
                        </td>
                    </tr>`).join('');

            renderFichesPagination(totalPages);
        }

        function renderFichesPagination(totalPages) {
            let container = document.getElementById('fiches-pagination');
            if (!container) {
                container = document.createElement('div');
                container.id = 'fiches-pagination';
                container.style.cssText = 'display:flex; justify-content:center; gap:8px; margin-top:24px; margin-bottom:12px;';
                document.querySelector('.page-body').appendChild(container);
            }
            if (totalPages <= 1) { container.innerHTML = ''; return; }
            let html = `<button onclick="changeFichesPage(${fichesPage - 1})" ${fichesPage === 1 ? 'disabled' : ''} style="padding:8px 12px; border-radius:8px; border:1px solid rgba(6,182,212,0.3); background:rgba(6,182,212,0.05); color:#06b6d4; cursor:pointer;">‹</button>`;
            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || (i >= fichesPage - 1 && i <= fichesPage + 1)) {
                    html += `<button onclick="changeFichesPage(${i})" style="padding:8px 12px; border-radius:8px; border:1px solid ${i === fichesPage ? '#06b6d4' : 'rgba(255,255,255,0.1)'}; background:${i === fichesPage ? 'rgba(6,182,212,0.15)' : 'transparent'}; color:${i === fichesPage ? '#06b6d4' : 'rgba(255,255,255,0.5)'}; cursor:pointer;">${i}</button>`;
                } else if (i === fichesPage - 2 || i === fichesPage + 2) {
                    html += `<span style="color:rgba(255,255,255,0.3); padding:8px 4px;">…</span>`;
                }
            }
            html += `<button onclick="changeFichesPage(${fichesPage + 1})" ${fichesPage === totalPages ? 'disabled' : ''} style="padding:8px 12px; border-radius:8px; border:1px solid rgba(6,182,212,0.3); background:rgba(6,182,212,0.05); color:#06b6d4; cursor:pointer;">›</button>`;
            container.innerHTML = html;
        }

        function changeFichesPage(p) {
            const totalPages = Math.ceil(allFiches.length / fichesPerPage);
            if (p < 1 || p > totalPages) return;
            fichesPage = p;
            renderFiches();
        }

        document.getElementById('ficheForm').onsubmit = async (e) => {
            e.preventDefault();
            const pid = document.getElementById('f_project').value;
            const project = projectsData.find(x => x.id == pid);

            const checklistItems = [];
            document.querySelectorAll('#checklist-body tr').forEach(tr => {
                const action = tr.querySelector('.ci-action').value;
                const observation = tr.querySelector('.ci-obs').value;
                if (action) checklistItems.push({ action, observation });
            });

            const data = {
                type: 'fiche_travaux',
                project_id: pid,
                client_id: project ? project.client_id : null,
                location: document.getElementById('f_location').value,
                responsible_tech: document.getElementById('f_tech').value,
                date: document.getElementById('f_date').value,
                items: checklistItems
            };

            try {
                if (currentEditingId) {
                    await api.put('/documents/' + currentEditingId, data);
                } else {
                    await api.post('/documents', data);
                }
                closeFicheModal();
                loadFiches();
            } catch(e) { notify.error("Erreur lors de l'enregistrement"); }
        };

        function updateRealTimeClock() {
            const now = new Date();
            const dateStr = now.toLocaleDateString('fr-FR');
            const timeStr = now.toLocaleTimeString('fr-FR');
            document.querySelectorAll('.rt-date').forEach(el => el.textContent = dateStr);
            document.querySelectorAll('.rt-time').forEach(el => el.textContent = timeStr);
        }
        setInterval(updateRealTimeClock, 1000);
        updateRealTimeClock();

    </script>
</body>
</html>
